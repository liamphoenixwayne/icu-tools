<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子签名背景消除与裁剪工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 30px; display: flex; justify-content: center; }
.container { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; padding: 24px; border: 1px solid #e5e4e0; }
h1 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #4f46e5; text-align: center; }
.upload-zone { border: 1.5px dashed #d0cdc8; border-radius: 10px; padding: 24px 12px; text-align: center; cursor: pointer; transition: all .15s; background: #fafaf8; margin-bottom: 20px; }
.upload-zone:hover { border-color: #4f46e5; background: #f5f3ff; }
.upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone p { font-size: 13px; color: #666; }
.upload-zone p strong { color: #4f46e5; }
input[type=file] { display: none; }
.ctrl-section { background: #fafaf8; border-radius: 8px; padding: 16px; margin-bottom: 20px; border: 1px solid #eef0f2; }
.ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-row label { font-size: 12px; color: #555; min-width: 60px; font-weight: 500; }
.ctrl-row input[type=range] { flex: 1; accent-color: #4f46e5; cursor: pointer; }
.ctrl-row span { font-size: 12px; color: #444; min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.preview-section { border: 1px solid #e5e4e0; border-radius: 8px; padding: 16px; background: #f9f8f6; margin-bottom: 20px; text-align: center; }
.preview-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.05em; }
.preview-box { display: inline-flex; align-items: center; justify-content: center; min-height: 100px; max-width: 100%; border: 1px dashed #ccc; border-radius: 6px; background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee); background-size: 16px 16px; background-position: 0 0, 8px 8px; padding: 10px; overflow: hidden; }
.preview-box img { max-width: 100%; max-height: 150px; object-fit: contain; display: none; }
.btn-group { display: flex; gap: 10px; }
.btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn-primary { background: #4f46e5; color: #fff; }
.btn-primary:hover { background: #4338ca; }
.btn-primary:disabled { background: #c7d2fe; cursor: not-allowed; }
.btn-ghost { background: #fff; color: #4f46e5; border: 1px solid #4f46e5; }
.btn-ghost:hover { background: #f5f3ff; }
.btn-ghost:disabled { color: #c7d2fe; border-color: #e2e8f0; background: #fff; cursor: not-allowed; }
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 12px; opacity: 0; transition: all .25s; pointer-events: none; z-index: 9999; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <h1>✍️ 签名透明化与自动裁剪工具</h1>
  
  <div class="upload-zone" id="dropZone">
    <div class="icon">📷</div>
    <p><strong>点击选择</strong>或拖入签名照片</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="ctrl-section">
    <div class="ctrl-row">
      <label>墨迹深度</label>
      <input type="range" id="bgGamma" min="10" max="300" value="120">
      <span id="bgGammaVal">120</span>
    </div>
    <div class="ctrl-row">
      <label>截断阈值</label>
      <input type="range" id="bgCutoff" min="100" max="255" value="230">
      <span id="bgCutoffVal">230</span>
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-title">透明裁切预览 (棋盘格代表透明)</div>
    <div class="preview-box">
      <img id="previewImg" alt="结果预览">
      <span id="emptyText" style="color: #aaa; font-size: 13px;">暂无图片</span>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-ghost" id="copyBtn" disabled>📋 复制到剪贴板</button>
    <button class="btn btn-primary" id="downloadBtn" disabled>💾 下载 PNG</button>
  </div>
</div>

<div id="toast"></div>

<script>
let originalDataUrl = null;
let processedBlob = null; // 用于存放准备复制的二进制数据

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const previewImg = document.getElementById('previewImg');
const emptyText = document.getElementById('emptyText');
const bgGamma = document.getElementById('bgGamma');
const bgGammaVal = document.getElementById('bgGammaVal');
const bgCutoff = document.getElementById('bgCutoff');
const bgCutoffVal = document.getElementById('bgCutoffVal');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');

// 事件绑定
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#4f46e5'; });
dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = '#d0cdc8');
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = '#d0cdc8';
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

[bgGamma, bgCutoff].forEach(input => {
  input.addEventListener('input', () => {
    bgGammaVal.textContent = bgGamma.value;
    bgCutoffVal.textContent = bgCutoff.value;
    if (originalDataUrl) processImage();
  });
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    originalDataUrl = e.target.result;
    processImage();
  };
  reader.readAsDataURL(file);
}

// 核心：去底、寻找边界、裁剪一体化函数
function processImage() {
  const img = new Image();
  img.onload = () => {
    // 1. 创建临时的 Full-size 画布用于去底计算
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = img.naturalWidth;
    tempCanvas.height = img.naturalHeight;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(img, 0, 0);
    
    const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
    const d = imgData.data;
    const gamma = parseInt(bgGamma.value) / 100;
    const cutoff = parseInt(bgCutoff.value);
    
    // 用于记录有笔迹（非透明）像素的极值边界
    let minX = tempCanvas.width, maxX = 0, minY = tempCanvas.height, maxY = 0;
    let hasPixels = false;

    // 2. 像素级去白底，并同步计算 Bounding Box
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      
      if (luma >= cutoff) {
        d[i+3] = 0; // 设为完全透明
        continue;
      }
      
      const t = luma / cutoff;
      const alpha = 1 - Math.pow(t, gamma);
      const factor = Math.min(1, alpha * 1.5);
      
      d[i] = Math.round(r * (1 - factor));
      d[i+1] = Math.round(g * (1 - factor));
      d[i+2] = Math.round(b * (1 - factor));
      d[i+3] = Math.round(alpha * 255);

      // 如果当前像素未完全透明，将其纳入边界计算
      if (d[i+3] > 10) { 
        const idx = i / 4;
        const x = idx % tempCanvas.width;
        const y = Math.floor(idx / tempCanvas.width);
        
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
        hasPixels = true;
      }
    }
    
    // 将去底后的像素写回临时画布
    tempCtx.putImageData(imgData, 0, 0);

    // 3. 创建最终的目标画布（精确裁剪笔迹区域）
    const finalCanvas = document.createElement('canvas');
    if (hasPixels) {
      // 增加 4 像素的内边距，防止切边过紧导致边缘笔画微损
      const padding = 4;
      let cropX = Math.max(0, minX - padding);
      let cropY = Math.max(0, minY - padding);
      let cropW = Math.min(tempCanvas.width - cropX, (maxX - minX) + padding * 2);
      let cropH = Math.min(tempCanvas.height - cropY, (maxY - minY) + padding * 2);

      finalCanvas.width = cropW;
      finalCanvas.height = cropH;
      const finalCtx = finalCanvas.getContext('2d');
      // 将临时画布的有效区域裁切搬运到最终画布上
      finalCtx.drawImage(tempCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
    } else {
      // 如果没识别到笔迹（比如阈值调得太极端），退回到原图大小
      finalCanvas.width = tempCanvas.width;
      finalCanvas.height = tempCanvas.height;
      finalCanvas.getContext('2d').putImageData(imgData, 0, 0);
    finalCanvas.getContext('2d').drawImage(tempCanvas, 0, 0);
    }

    // 4. 导出给预览与按钮
    const outUrl = finalCanvas.toDataURL('image/png');
    previewImg.src = outUrl;
    previewImg.style.display = 'block';
    emptyText.style.display = 'none';
    
    copyBtn.disabled = false;
    downloadBtn.disabled = false;

    // 转换为二进制 Blob 以供异步剪贴板 API 使用
    finalCanvas.toBlob(blob => { processedBlob = blob; }, 'image/png');
  };
  img.src = originalDataUrl;
}

// 异步复制图片到剪贴板功能
copyBtn.addEventListener('click', async () => {
  if (!processedBlob) return;
  try {
    const item = new ClipboardItem({ "image/png": processedBlob });
    await navigator.clipboard.write([item]);
    toast('✅ 已成功复制透明签名到剪贴板！');
  } catch (err) {
    console.error(err);
    toast('❌ 浏览器限制，复制失败。请尝试点击下载 PNG');
  }
});

// 下载 PNG 功能
downloadBtn.addEventListener('click', () => {
  if (!previewImg.src) return;
  Object.assign(document.createElement('a'), {
    href: previewImg.src,
    download: 'transparent_signature.png'
  }).click();
});

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
</body>
</html>
